name: Weekly Article Auto-Publish

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:
    inputs:
      topic:
        description: "記事トピック（空白でAI自動選定）"
        required: false
        default: ""

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests python-dotenv

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GH_PAT }}
          GITHUB_OWNER:        ${{ github.repository_owner }}
          GITHUB_REPO:         ${{ github.event.repository.name }}
          BUTTONDOWN_API_KEY:  ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -z "$TOPIC" ]; then
            python run_all.py --no-newsletter
          else
            python run_all.py --topic "$TOPIC" --no-newsletter
          fi

      - name: Commit generated article
        run: |
          git config user.name "ChainClarity Bot"
          git config user.email "bot@chainclarityblog.com"
          git add .
          git commit -m "chore: auto-generated article [skip ci]" || echo "Nothing to commit"
          git pull --rebase origin main
          git push
