<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="18" fill="#080f18"/>

  <!-- 中心(50,50) -->
  <!-- 8リンク円形配置、交互前後交差 -->

  <!-- ── 後ろ側（暗め）斜めリンク ── -->
  <!-- top-right 45度 -->
  <rect x="57" y="14" width="9" height="20" rx="4.5" fill="none" stroke="rgba(0,229,160,0.3)" stroke-width="2"
        transform="rotate(45 61.5 24)"/>
  <!-- bottom-right 135度 -->
  <rect x="57" y="66" width="9" height="20" rx="4.5" fill="none" stroke="rgba(0,229,160,0.3)" stroke-width="2"
        transform="rotate(-45 61.5 76)"/>
  <!-- bottom-left 225度 -->
  <rect x="34" y="66" width="9" height="20" rx="4.5" fill="none" stroke="rgba(0,229,160,0.3)" stroke-width="2"
        transform="rotate(45 38.5 76)"/>
  <!-- top-left 315度 -->
  <rect x="34" y="14" width="9" height="20" rx="4.5" fill="none" stroke="rgba(0,229,160,0.3)" stroke-width="2"
        transform="rotate(-45 38.5 24)"/>

  <!-- ── 前側（明るい）縦横リンク ── -->
  <!-- top -->
  <rect x="37" y="12" width="26" height="12" rx="6" fill="none" stroke="#00e5a0" stroke-width="2.2"/>
  <!-- right -->
  <rect x="76" y="44" width="12" height="12" rx="6" fill="none" stroke="#00e5a0" stroke-width="2.2"
        transform="rotate(90 82 50)"/>
  <!-- bottom -->
  <rect x="37" y="76" width="26" height="12" rx="6" fill="none" stroke="#00e5a0" stroke-width="2.2"/>
  <!-- left -->
  <rect x="12" y="44" width="12" height="12" rx="6" fill="none" stroke="#00e5a0" stroke-width="2.2"
        transform="rotate(90 18 50)"/>

  <!-- 交差点ドット -->
  <circle cx="37" cy="22" r="2.5" fill="#080f18"/>
  <circle cx="37" cy="22" r="1.5" fill="rgba(0,229,160,0.7)"/>
  <circle cx="63" cy="22" r="2.5" fill="#080f18"/>
  <circle cx="63" cy="22" r="1.5" fill="rgba(0,229,160,0.7)"/>
  <circle cx="78" cy="37" r="2.5" fill="#080f18"/>
  <circle cx="78" cy="37" r="1.5" fill="rgba(0,229,160,0.7)"/>
  <circle cx="78" cy="63" r="2.5" fill="#080f18"/>
  <circle cx="78" cy="63" r="1.5" fill="rgba(0,229,160,0.7)"/>
  <circle cx="63" cy="78" r="2.5" fill="#080f18"/>
  <circle cx="63" cy="78" r="1.5" fill="rgba(0,229,160,0.7)"/>
  <circle cx="37" cy="78" r="2.5" fill="#080f18"/>
  <circle cx="37" cy="78" r="1.5" fill="rgba(0,229,160,0.7)"/>
  <circle cx="22" cy="63" r="2.5" fill="#080f18"/>
  <circle cx="22" cy="63" r="1.5" fill="rgba(0,229,160,0.7)"/>
  <circle cx="22" cy="37" r="2.5" fill="#080f18"/>
  <circle cx="22" cy="37" r="1.5" fill="rgba(0,229,160,0.7)"/>

  <!-- 中心ドット -->
  <circle cx="50" cy="50" r="3" fill="rgba(0,229,160,0.4)"/>
  <circle cx="50" cy="50" r="1.5" fill="#00e5a0"/>
</svg>
